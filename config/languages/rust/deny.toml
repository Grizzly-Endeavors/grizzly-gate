# Gate-owned cargo-deny config (authoritative; passed via `--config`). Folded
# from the residuum house config, generalized for the whole fleet: no repo-
# specific advisory ignores and no local db-path (the gate resolves the advisory
# DB itself). This replaces any deny.toml shipped in the repo being gated.
#
# Dependency posture (sanctioned 2026-06-28, further loosened 2026-07-05): the
# SCA tooling blocks on KNOWN VULNERABILITIES only. Unmaintained/yanked advisories
# and license terms genuinely leave repos undeployable for non-security reasons
# and are a maintenance burden, so they are downgraded to non-blocking here (and
# license enforcement is dropped from osv-scanner). Real vulnerabilities still
# fail closed. See ADR-034, ADR-037.

[advisories]
version = 2
# Vuln-only: cargo-deny still errors on RUSTSEC *vulnerabilities*. Unmaintained
# advisories (e.g. a transitive crate a maintainer abandoned, with no upgrade) no
# longer block — they're not a vulnerability and a downstream repo usually can't
# fix them. Yanked crates warn rather than fail for the same reason.
unmaintained = "none"
yanked = "warn"
# Fleet-accepted vulnerability advisories (see ADR-034: the gate is otherwise
# vuln-only and blocks on every real vulnerability). Each entry here is a real
# vulnerability accepted anyway because no fixed release exists upstream. Keep
# this list short and justified; remove an entry once a fix lands.
ignore = [
  # rsa: Marvin Attack timing sidechannel (CVE-2023-49092). No fixed rsa
  # release exists upstream as of this writing; pulled transitively via
  # sqlx-mysql's auth handshake in multiple fleet repos. Exploitation requires
  # network-position timing measurement against the affected code path.
  "RUSTSEC-2023-0071",
]

[licenses]
version = 2
confidence-threshold = 0.8
unused-allowed-license = "allow"
# ADR-037: cargo-deny's [licenses] is allow-list only — there is no `deny`/
# `copyleft` field to invert the posture into a true deny-list (verified against
# the pinned cargo-deny 0.19.x schema; `cargo deny init` documents the full field
# set: allow/confidence-threshold/exceptions/clarify/private, nothing else). This
# is therefore the practical equivalent: a maximally broad permissive +
# weak-copyleft allow-list covering the SPDX ids actually seen across the fleet's
# ecosystems, so a new-but-ordinary license essentially never needs a manual add.
# Copyleft-strong (GPL/AGPL/SSPL) is deliberately still absent — the one license
# family the gate continues to block on, by omission (unlisted = denied by
# cargo-deny's built-in default, not a separate `deny` entry).
allow = [
  "MIT",
  "MIT-0",
  "Apache-1.1",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "AFL-2.1",
  "AFL-3.0",
  "Artistic-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD-3-Clause-Clear",
  "BSD-3-Clause-Attribution",
  "BSD-4-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "BSL-1.0",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  "0BSD",
  "BlueOak-1.0.0",
  "PSF-2.0",
  "Python-2.0",
  "CC0-1.0",
  "CC-BY-3.0",
  "CC-BY-4.0",
  "CC-PDDC",
  "Unlicense",
  "WTFPL",
  "OpenSSL",
  "LGPL-2.1",
  "LGPL-2.1-or-later",
  "LGPL-3.0",
  "LGPL-3.0-or-later",
  "EPL-1.0",
  "EPL-2.0",
  "EUPL-1.2",
  "HPND",
  "ICU",
  "IJG",
  "Libpng",
  "MulanPSL-2.0",
  "NCSA",
  "OFL-1.1",
  "Ruby",
  "Vim",
  "X11",
  "Xnet",
  "Zend-2.0",
  "curl",
  "FTL",
  "Fair",
  "Info-ZIP",
]

[bans]
multiple-versions = "warn"
# Stricter than residuum: wildcard (`*`) version requirements are denied — they
# defeat reproducible dependency resolution.
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
