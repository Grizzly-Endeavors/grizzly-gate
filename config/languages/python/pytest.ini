# Gate-owned pytest config (passed via -c, authoritative over the repo's
# pytest/pyproject settings). Test *discovery* is inherently repo-shaped — this
# is the known-fragile case the plan calls out; rules/tooling to harden it land
# later. Defaults below match pytest's own conventions.
#
# pythonpath = . puts the repo rootdir on sys.path so first-party imports
# (`from backend.api import …`) resolve for the loose-layout case where the repo
# isn't an installable package — the deps check editable-installs packages, this
# covers the rest. The repo's own `pythonpath` is discarded by config-forcing
# (the gate `-c` wins); this is the gate's own default, not the repo's. See ADR-032.
[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers
