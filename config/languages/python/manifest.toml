# Python language adapter. Activated by a `pyproject.toml` at the source root.
# Each tool is pointed at the gate's own config, so a repo's pyproject/ruff/mypy
# settings cannot relax the checks.
name = "python"
marker = "pyproject.toml"

# Honest-map evidence: any `.py`/`.pyi` file (or extensionless `python`/`python3`
# shebang script) must be covered by a declared python project (harness `detect`).
[detect]
extensions = ["py", "pyi"]
shebangs = ["python", "python3"]

# Install the repo's deps into a per-project `.venv` BEFORE mypy/pytest run — the
# Node `npm ci` analog. Without this, third-party imports resolve to `Any` (mypy
# strict cascades) and the repo's own package isn't importable (pytest collection
# fails). uv is a gate-side installer detail using its pip interface against the
# repo's STANDARD inputs (requirements.txt / pyproject) — a repo never has to
# adopt uv. Hybrid first-party resolution: editable-install when the repo is a
# package (`[project]`/`[build-system]`), else install requirements.txt and let
# `pythonpath = .` (gate pytest.ini) resolve first-party code by rootdir. pytest
# is installed INTO the venv (it must run in-process with the deps; no
# `--python-executable` flag like mypy) at the Dockerfile-pinned version, exposed
# as $GATE_PYTEST_VERSION so the pin stays single-sourced. `.venv` is in
# detect.toml skip_dirs (honest-map-safe) and excluded from trivy-fs. See ADR-032.
#
# `uv venv --clear` is mandatory, not optional: the gate mounts the working tree
# read-write and leaves `.venv` on disk, so on every run after the first the dir
# already exists — and `uv venv` (unlike `npm ci`) errors out on a pre-existing
# venv instead of reusing it. Without --clear the deps check fails on the second
# run onward, cascading into mypy/pytest (which invoke `.venv/bin/...`). --clear
# rebuilds the venv from scratch each run, which is the faithful `npm ci` analog
# anyway: a clean, reproducible dependency set, not an accreted one.
[[checks]]
name = "deps"
cmd = "sh -c 'set -eu; uv venv .venv --clear; if [ -f requirements.txt ]; then uv pip install -r requirements.txt; fi; if grep -qE \"^\\[(project|build-system)\\]\" pyproject.toml; then uv pip install -e .; fi; uv pip install \"pytest==$GATE_PYTEST_VERSION\"'"

[[checks]]
name = "ruff"
# --output-format json emits diagnostics on stdout; ruff still exits non-zero on
# any violation, so the verdict is unchanged.
cmd = "ruff check --output-format json --config {config}/ruff.toml ."
output = { parser = "ruff" }

[[checks]]
name = "mypy"
# --python-executable points mypy's import resolution at the repo's installed
# deps (in .venv) while mypy itself runs from its own pinned pipx venv.
# --output json emits newline-delimited diagnostics on stdout (mypy 1.11+); it
# still exits non-zero on type errors, so the verdict is unchanged.
cmd = "mypy --output json --config-file {config}/mypy.ini --python-executable .venv/bin/python ."
output = { parser = "mypy" }

[[checks]]
name = "pytest"
# Run from the venv so the repo's installed package + third-party deps import;
# the gate pytest.ini (pythonpath = .) covers the loose-layout case.
cmd = ".venv/bin/pytest -c {config}/pytest.ini -q"
