# Node language adapter. Activated by a declared node project (`package.json`
# marker). `npm ci` installs the repo's deps (needed for type resolution); lint +
# typecheck then run against the gate's own config rather than the repo's.
#
# eslint + tsc run from the gate's own toolchain (installed into this dir's
# node_modules at image build — see Dockerfile), so the flat config can resolve
# typescript-eslint and TS files get full type-aware linting, not just JS.
#
# tsc is the structurally-fragile case (a repo's tsconfig defines its own
# module/path layout). When a project sets `tsconfig` in gate-config.json, the
# harness wraps that tsconfig — honoring its module/path resolution while force-
# overriding the strict compiler family, so the repo cannot relax strictness. The
# same wrapped tsconfig drives type-aware eslint (via GATE_TSCONFIG). A node
# project containing TypeScript must declare its `tsconfig` (harness fails closed
# otherwise); a JS-only project may omit it and use the gate's `tsconfig.base.json`.
name = "node"
marker = "package.json"

# Honest-map evidence: any TS/JS file (or extensionless `node` shebang script)
# must be covered by a declared node project (harness `detect`). `.svelte`
# components ride the node adapter too — a Svelte repo is a node project (it has
# a `package.json`), so Svelte is folded in here rather than given its own
# adapter (see ADR-031). React (`.jsx`/`.tsx`) needs no extra extension; it is
# already node-detected and gets React-specific eslint rules (rules-of-hooks).
[detect]
extensions = ["ts", "tsx", "js", "jsx", "mjs", "cjs", "svelte"]
shebangs = ["node"]

[[checks]]
name = "deps"
cmd = "npm ci"

[[checks]]
name = "eslint"
# Type-aware rules need the TS program; GATE_TSCONFIG hands the flat config the
# same wrapped tsconfig tsc uses. GATE_SKIP_DIRS hands it the Ops-owned skip_dirs
# so eslint ignores the same generated/vendor dirs the honest-map walk does
# (build/dist/.svelte-kit/…) — ESLint 9 flat config does not auto-ignore those.
# Gate-owned binary so the toolchain is fixed. `eslint.config.mjs` is materialized
# by the harness from `eslint.config.mjs.tmpl` at run time (the tree ships only the
# `.tmpl` so the gate can gate itself — see that file's header and ADR-033).
cmd = "{config}/node_modules/.bin/eslint --config {config}/eslint.config.mjs --no-config-lookup --no-error-on-unmatched-pattern ."
env = { GATE_TSCONFIG = "{tsconfig}", GATE_SKIP_DIRS = "{skip_dirs}" }

[[checks]]
name = "tsc"
# `--project` carries noEmit/strictness via the (wrapped) tsconfig; passing those
# as flags too conflicts with `-p` on some tsc versions, so they live in config.
cmd = "{config}/node_modules/.bin/tsc --project {tsconfig}"

[[checks]]
name = "svelte-check"
# Type-aware checking of `.svelte` components (tsc can't parse single-file
# components). Runs against the SAME wrapped tsconfig tsc uses, so component
# `<script lang="ts">` is held to the gate's forced strictness; the repo's own
# svelte.config.js (preprocessing only) is loaded from the project dir. This
# check runs for every node project, so it's guarded to no-op when the project
# has no `.svelte` files (node_modules excluded). A node project whose `.svelte`
# components use TypeScript must declare a `tsconfig`, or the honest map fails
# closed (harness `detect`) — the same rule TS files get.
cmd = "sh -c 'if [ -n \"$(find . -name \"*.svelte\" -not -path \"./node_modules/*\" -print -quit)\" ]; then exec \"{config}/node_modules/.bin/svelte-check\" --tsconfig \"{tsconfig}\"; fi'"
