# Ansible language adapter. Activated by an `ansible` directory at the source
# root. ansible-lint runs against the gate's own ruleset, not the repo's.
name = "ansible"
marker = "ansible"

[[checks]]
name = "ansible-lint"
# --strict: warnings are treated as failures — warnings are blockers.
# -f json (an alias for codeclimate) emits findings on stdout; ansible-lint still
# exits non-zero on any violation, so the verdict is unchanged.
cmd = "ansible-lint --strict -f json -c {config}/ansible-lint.yml"
output = { parser = "ansible-lint" }
