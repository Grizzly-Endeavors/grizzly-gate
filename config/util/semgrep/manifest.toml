# SAST scanner. Runs against the source tree on every invocation, using the
# offline ruleset vendored into `{config}/rules` at image build time (no
# registry fetch at scan time — reproducible per gate version).
name = "semgrep"
scope = "source"
# --json emits machine-readable findings on stdout; --error keeps the failing
# exit code (the verdict), so adding JSON is presentation-only. The harness
# distills `results[]` into normalized findings.
#
# --exclude dist/build/.svelte-kit: these hold pure build OUTPUT, regenerated
# deterministically from first-party source — not vendored/third-party code, so
# scanning them for hidden malicious code buys nothing. Unlike `node_modules`/
# `vendor`/`target` (still scanned; a real supply-chain vector), these dirs can
# also be recreated mid-run: the node adapter's `deps` check (`npm ci`) runs
# BEFORE this scanner and triggers a SvelteKit project's `prepare` script
# (`svelte-kit sync`), which writes `.svelte-kit/generated/**` into the source
# tree — a fresh, gate-owned build artifact that would otherwise false-positive
# on framework-internal codegen (e.g. dynamic dispatch in generated router glue),
# even on a byte-for-byte clean CI checkout. Scoped narrowly on purpose; this is
# not the same list as `skip_dirs`.
#
# --exclude-rule string-concat-in-list: this rule flags implicit adjacent-literal
# string concatenation inside a list/call, because that shape is also the
# signature of a missing comma between two list elements. But semgrep cannot tell
# an intentional multi-line string from a lost comma, and implicit concatenation
# is exactly the form ruff prefers (FLY002) and permits (ISC001 deferred to the
# formatter, ISC002 dormant since allow-multiline defaults true). The two tools
# left NO shape for a static multi-line string (e.g. long SQL text) that satisfies
# both — implicit trips semgrep, `+` trips ruff ISC003 (and can trip semgrep's
# avoid-sqlalchemy-text), an f-string trips ruff F541. Excluding this one rule
# makes implicit concatenation the single clean canonical form. The rule id is the
# vendored rules' path-derived id (rules live at the fixed install path below).
# See ADR-040.
cmd = "semgrep scan --json --error --quiet --exclude=dist --exclude=build --exclude=.svelte-kit --exclude-rule=etc.grizzly-gate.config.util.semgrep.rules.python.lang.correctness.common-mistakes.string-concat-in-list --config {config}/rules {source}"
output = { parser = "semgrep" }
