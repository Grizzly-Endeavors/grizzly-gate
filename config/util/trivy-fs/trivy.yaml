# Gate-owned Trivy filesystem (source SCA) config, passed via --config. Scans the
# repo's committed dependency lockfiles/manifests for known-vulnerable packages
# across ecosystems (npm, PyPI, Go, …) using Trivy's aggregated advisory DB — a
# second, broader vuln source alongside osv-scanner (union = more denial).
#
# Max-denial posture (cargo-deny parity): fail on EVERY severity, including
# unfixable (unlike the image scanner, which ignores unfixed OS CVEs). The DB is
# refreshed at scan time for freshest advisories.
scan:
  scanners:
    - vuln
  # Exclude the gate-created Python venv. The Python adapter's `deps` check builds
  # `.venv` and installs the repo's deps PLUS the gate-injected pytest into it.
  # Trivy's installed-package analyzer would otherwise scan that venv and falsely
  # attribute a CVE in the gate's OWN pytest toolchain to the scanned repo. No
  # real coverage is lost — the repo's committed manifests/lockfiles are still
  # scanned directly (here and by osv-scanner). See ADR-032.
  skip-dirs:
    - .venv
    - venv
severity:
  - UNKNOWN
  - LOW
  - MEDIUM
  - HIGH
  - CRITICAL
vulnerability:
  # Source SCA is about the repo's declared dependencies, not OS packages.
  type:
    - library
  # Deny even vulns with no fix yet — actionable here means "drop/replace the dep,"
  # not "wait for a deploy." (The image scanner makes the opposite trade for OS CVEs.)
  ignore-unfixed: false
