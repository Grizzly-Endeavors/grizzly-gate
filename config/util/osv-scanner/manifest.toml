# Source dependency (SCA) scanner — Google OSV-Scanner. The cargo-deny analog for
# every non-Rust ecosystem (and a second pass over Rust): one scan fails on
#   (a) any known vulnerability in a committed lockfile — OSV.dev, ALL severities,
#       including unfixable (max-denial parity with cargo-deny); and
#   (b) any dependency whose license falls outside the platform allowlist
#       (deny-by-default, mirrors the Rust fleet's deny.toml; an unmapped or
#       "non-standard" license is denied too).
#
# Advisory + license data is fetched FRESH at scan time (deps.dev / OSV.dev), so a
# newly-disclosed CVE fails a previously-green build — intended. The step fails
# closed if the data can't be fetched. `--allow-no-lockfiles` lets a repo with no
# dependency manifests (e.g. pure Ansible/YAML) pass cleanly instead of erroring.
#
# NOTE: `--licenses` accepts only plain SPDX license IDs — osv-scanner 2.4.0
# rejects any `<id> WITH <exception>` expression (it errors out the whole scan,
# which previously broke this check for every repo). So `Apache-2.0 WITH
# LLVM-exception` is NOT listed; plain `Apache-2.0` is. A dependency whose license
# is exactly the LLVM-exception form is therefore flagged — rare; escalate to Ops
# if a fleet dependency legitimately needs it.
#
# The allowlist is standard-permissive only (deny-by-default holds). It was
# widened after a real run flagged near-universal permissive licenses that should
# never have blocked a build: PSF-2.0 (the Python license — typing-extensions and
# much of the CPython stdlib-adjacent ecosystem; gates nearly every Python repo
# without it), Python-2.0 (its older variant), 0BSD (zero-clause BSD, tslib), and
# BlueOak-1.0.0 (modern permissive, minimatch). All are OSI/permissive with no
# copyleft or notice-propagation burden beyond what BSD/MIT already carry.
#
# `--config` points at an osv-scanner.toml the harness GENERATES at run time (into
# this dir) listing the scanned repo's OWN crate names as `license.ignore`
# overrides — osv-scanner resolves licenses from the registry, so a project's own
# unpublished package resolves to UNKNOWN and would trip the allowlist; the gate
# license-checks dependencies, not the repo itself. `--config` also disables
# auto-discovery of a repo's own osv-scanner.toml, keeping the gate config
# authoritative (config-forcing). See `materialize_osv_config` in harness/src/main.rs.
name = "osv-scanner"
scope = "source"
# Vuln-only (sanctioned 2026-06-28, ADR-034): `--licenses` enforcement is dropped
# — dependency licenses no longer block a deploy (they genuinely left repos
# undeployable for non-security reasons and were a maintenance burden). Known
# vulnerabilities still fail closed across every ecosystem. Unmaintained-class
# advisories with no fix are ignored fleet-wide via the harness-generated
# osv-scanner.toml (see materialize_osv_config); the gate is the reviewer for
# vulnerabilities, not dependency hygiene.
cmd = 'osv-scanner scan source -r --format=json --config={config}/osv-scanner.toml --allow-no-lockfiles {source}'
# --format=json emits the report on stdout; osv-scanner still exits non-zero on
# any vulnerability, so the verdict is unchanged. One finding per advisory group.
output = { parser = "osv-scanner" }
